name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v2.1.8)'
        required: true
        type: string

concurrency:
  group: ci-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DISCORD_REPORT_API_URL: ${{ vars.DISCORD_REPORT_API_URL }}

jobs:
  # ─── Code Quality Checks ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: cd ISM-Library/packages/ui && bun install --frozen-lockfile && bun run build
      - run: bun run typecheck

  lint-js:
    name: JS/TS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: cd ISM-Library/packages/ui && bun install --frozen-lockfile && bun run build
      - run: bun run lint

  rust-check:
    name: Rust Check & Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - run: bun install --frozen-lockfile
      - run: cd ISM-Library/packages/ui && bun install --frozen-lockfile && bun run build
      - run: bun run rust:check
      - run: bun run rust:lint
      - run: bun run rust:test

  # ─── Prepare Release (runs after checks pass) ─────────────────────────────
  prepare-release:
    name: Prepare Release
    needs: [typecheck, lint-js, rust-check]
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      RELEASE_TAG: ${{ steps.set_tag.outputs.RELEASE_TAG }}
      SHOULD_RELEASE: ${{ steps.check_tag.outputs.SHOULD_RELEASE }}
    steps:
      - uses: actions/checkout@v7
      - name: Get tag from package.json or inputs
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r .version package.json)
            echo "RELEASE_TAG=v$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Check if release already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.set_tag.outputs.RELEASE_TAG }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "Release $TAG already exists and this is a push to main. Skipping release build."
              echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create GitHub Release
    needs: prepare-release
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          name: ISpooferMotion ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ─── Platform Builds (all run in parallel once release is created) ─────────
  build-and-release:
    name: Build & Release (${{ matrix.os }})
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2025
            os: windows
            bundles: nsis
            args: ""
          - platform: macos-latest
            os: macos
            bundles: dmg
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            os: linux
            bundles: appimage
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install --frozen-lockfile && bun run build

      - name: Build app (macOS / Linux)
        if: matrix.os != 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }} ${{ matrix.args }}
          tagName: ${{ needs.prepare-release.outputs.RELEASE_TAG }}

      - name: Build app (Windows)
        if: matrix.os == 'windows'
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      - name: Upload Windows bundle to release
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          files: src-tauri/target/release/bundle/nsis/*setup*.exe
          fail_on_unmatched_files: true

  # ─── Plugin Build (runs in parallel with platform builds) ─────────────────
  plugin-release:
    name: Build & Release Plugin
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install --frozen-lockfile && bun run build

      - name: Build plugin
        run: bun run build:plugin

      - name: Upload plugin to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          files: dist-plugin/ISpooferMotion.rbxmx
          fail_on_unmatched_files: true
