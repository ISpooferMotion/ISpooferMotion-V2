name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v2.1.8)'
        required: true
        type: string

concurrency:
  group: ci-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DISCORD_REPORT_API_URL: ${{ vars.DISCORD_REPORT_API_URL }}

jobs:
  check:
    name: Code Quality & Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: bun install

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Run CI Checks
        run: bun run check

  prepare-release:
    name: Prepare Release
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      RELEASE_TAG: ${{ steps.set_tag.outputs.RELEASE_TAG }}
      SHOULD_RELEASE: ${{ steps.check_tag.outputs.SHOULD_RELEASE }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag from package.json or inputs
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r .version package.json)
            echo "RELEASE_TAG=v$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Check if tag exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.set_tag.outputs.RELEASE_TAG }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            # Release already exists. If this was a manual dispatch or a tag push, we still want to upload assets to it.
            # If it was just a push to main and the version hasn't changed, skip release building.
            if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
              echo "Release $TAG already exists and this is a push to main. Skipping release build."
              echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
            else
              echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create GitHub Release
    needs: prepare-release
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          name: ISpooferMotion ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-and-release:
    name: Build & Release (${{ matrix.os }}, ${{ matrix.bundles }})
    needs: [prepare-release, create-release]
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2025
            os: windows
            bundles: nsis
            rust_targets: ""
            args: ""
          - platform: macos-latest
            os: macos
            bundles: dmg
            rust_targets: "aarch64-apple-darwin, x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            os: linux
            bundles: appimage
            rust_targets: ""
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Build app (macOS / Linux)
        if: matrix.os != 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }} ${{ matrix.args }}
          tagName: ${{ needs.prepare-release.outputs.RELEASE_TAG }}

      - name: Build app (Windows Unsigned Inner)
        if: matrix.os == 'windows'
        run: bun run tauri build --no-bundle

      - name: Build app (Windows Bundle)
        if: matrix.os == 'windows'
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      - name: Upload Windows Bundle to Release
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          files: src-tauri/target/release/bundle/nsis/*setup*.exe
          fail_on_unmatched_files: true

  plugin-release:
    name: Build & Release Plugin
    needs: [prepare-release, build-and-release]
    if: needs.prepare-release.outputs.SHOULD_RELEASE == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Build plugin
        run: bun run build:plugin

      - name: Upload plugin to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.RELEASE_TAG }}
          files: dist-plugin/ISpooferMotion.rbxmx
          fail_on_unmatched_files: true
