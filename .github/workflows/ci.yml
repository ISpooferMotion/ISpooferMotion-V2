name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update (example: v2.1.8)'
        required: true
        type: string

concurrency:
  group: ci-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  DISCORD_REPORT_API_URL: ${{ vars.DISCORD_REPORT_API_URL }}

jobs:
  check:
    name: Code Quality & Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: bun install

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Run CI Checks
        run: bun run check

  build-and-release:
    name: Build & Release (${{ matrix.os }}, ${{ matrix.bundles }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2025
            os: windows
            bundles: nsis
            rust_targets: ""
            args: ""
          - platform: macos-latest
            os: macos
            bundles: dmg
            rust_targets: "aarch64-apple-darwin, x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            os: linux
            bundles: appimage
            rust_targets: ""
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          os: ${{ matrix.os }}

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Build app (macOS / Linux)
        if: matrix.os != 'windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles ${{ matrix.bundles }} ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ISpooferMotion ${{ env.RELEASE_TAG }}
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          retryAttempts: 2

      - name: Build app (Windows Unsigned Inner)
        if: matrix.os == 'windows'
        run: bun run tauri build --no-bundle

      - name: Build app (Windows Bundle)
        if: matrix.os == 'windows'
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      - name: Upload Windows Bundle to Release
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ISpooferMotion ${{ env.RELEASE_TAG }}
          body: 'See the assets below to download and install this version.'
          files: src-tauri/target/release/bundle/nsis/*setup*.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  plugin-release:
    name: Build & Release Plugin
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Build ISM-Library
        run: cd ISM-Library/packages/ui && bun install && bun run build

      - name: Build plugin
        run: bun run build:plugin

      - name: Upload plugin to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ISpooferMotion ${{ env.RELEASE_TAG }}
          body: 'See the assets below to download and install this version.'
          files: dist-plugin/ISpooferMotion.rbxmx
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
